map $http_x_forwarded_proto $nortix_forwarded_proto {
  default $http_x_forwarded_proto;
  "" $scheme;
}

server {
  listen 80;
  server_name hub.nortixlabs.com _;
  root /usr/share/nginx/html;
  index index.html;
  client_max_body_size 2m;

  location = /healthz {
    access_log off;
    default_type text/plain;
    return 200 "ok\n";
  }

  location /api/ {
    proxy_pass http://api:4000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $nortix_forwarded_proto;
    proxy_connect_timeout 5s;
    proxy_read_timeout 30s;
  }

  location = /sitemap.xml {
    proxy_pass http://api:4000/sitemap.xml;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $nortix_forwarded_proto;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  gzip on;
  gzip_types application/javascript application/json text/css text/plain image/svg+xml;

  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  add_header X-Frame-Options DENY always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
}
