name: nortix-hub

x-api-image: &api-image
  image: ${NORTIX_API_IMAGE:-nortix-hub-api:local}
  build:
    context: .
    dockerfile: docker/api.Dockerfile

services:
  postgres:
    image: postgres:16.14-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nortix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-nortix}
    volumes:
      - nortix-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nortix} -d ${POSTGRES_DB:-nortix}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - backend

  migrate:
    <<: *api-image
    restart: "no"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-nortix}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-nortix}?schema=public
    command: ["pnpm", "--filter", "@nortix/database", "migrate:deploy"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

  api:
    <<: *api-image
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-nortix}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-nortix}?schema=public
      PORT: 4000
      HOST: 0.0.0.0
      WEB_ORIGIN: ${WEB_ORIGIN:-https://hub.nortixlabs.com,http://localhost:8080}
      AUTH_MODE: ${AUTH_MODE:-firebase}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-nortix-hub}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL:-}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY:-}
      INTEGRATION_SIGNING_SECRET: ${INTEGRATION_SIGNING_SECRET:?Set INTEGRATION_SIGNING_SECRET in .env}
      PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET:?Set PAYMENT_WEBHOOK_SECRET in .env}
      IDENTITY_VERIFICATION_SECRET: ${IDENTITY_VERIFICATION_SECRET:?Set IDENTITY_VERIFICATION_SECRET in .env}
      MIN_WITHDRAWAL_USD: ${MIN_WITHDRAWAL_USD:-10}
    expose:
      - "4000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:4000/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - backend
      - egress

  web:
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY:-AIzaSyCzjEFRn99wUd9DIYjT_G0SUG7yJVgFTVU}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN:-nortix-hub.firebaseapp.com}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID:-nortix-hub}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET:-nortix-hub.firebasestorage.app}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID:-980209955984}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID:-1:980209955984:web:8e2360bd2f477436b71415}
        VITE_FIREBASE_MEASUREMENT_ID: ${VITE_FIREBASE_MEASUREMENT_ID:-G-GL9E62NFSS}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - backend
      - edge

  cloudflared:
    image: cloudflare/cloudflared:2026.7.2
    restart: unless-stopped
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    command:
      - tunnel
      - --no-autoupdate
      - --loglevel
      - info
      - --metrics
      - 127.0.0.1:2000
      - run
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "ready", "--metrics", "127.0.0.1:2000"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 15s
    networks:
      - edge

volumes:
  nortix-postgres:

networks:
  backend:
    internal: true
  edge:
  egress:
