services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nortix
      POSTGRES_PASSWORD: nortix
      POSTGRES_DB: nortix
    ports:
      - "5432:5432"
    volumes:
      - nortix-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nortix"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      DATABASE_URL: postgresql://nortix:nortix@postgres:5432/nortix?schema=public
      PORT: 4000
      HOST: 0.0.0.0
      WEB_ORIGIN: http://localhost:8080
      AUTH_MODE: mock
      INTEGRATION_SIGNING_SECRET: local-integration-secret
      PAYMENT_WEBHOOK_SECRET: local-payment-secret
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        VITE_API_URL: http://localhost:4000/v1
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  nortix-postgres:
